
[project]
name = "elevator_service"
version = "0.0.1"
requires-python = "==3.13.*"
dependencies = [
    "colorlog>=6.10.1",
    "fastapi>=0.136.3",
    "numpy>=2.4.6",
    "pulp>=3.3.2",
    "pydantic>=2.13.4",
    "pydtmc>=8.7.0",
]

[dependency-groups]
dev = [
    "pylint-pydantic>=0.4.1",
    "pytest>=9.0.3",
    "pytest-asyncio>=1.4.0",
    "ruff>=0.15.14",
    "uvicorn>=0.48.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I", "N", "B"]
ignore = []

[tool.ruff.format]
quote-style = "double"

[tool.mypy]
mypy_path = "src"
explicit_package_bases = true
namespace_packages = true

[tool.pylint.main]
source-roots = ["src"]
load-plugins = ["pylint_pydantic"]

[tool.pytest.ini_options]
pythonpath = ["."]
python_files = ["*_test.py"]
